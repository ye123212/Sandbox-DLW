<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentShield Live Chat Demo</title>
    <style>
      :root {
        --bg: #eef2f7;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe3ef;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: linear-gradient(140deg, #f8fafc 0%, #e9eef8 100%);
        color: var(--ink);
        font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap {
        max-width: 1080px;
        margin: 28px auto 84px;
        padding: 0 16px;
      }
      .chat-shell {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .chat-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      .chat-title { font-weight: 800; }
      .meta { font-size: 12px; color: var(--muted); }
      .chat-body {
        height: min(65vh, 720px);
        overflow: auto;
        padding: 14px;
        background: #f8fafc;
      }
      .msg {
        max-width: 86%;
        margin: 0 0 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        white-space: pre-wrap;
      }
      .msg.user {
        margin-left: auto;
        background: #0f172a;
        color: #fff;
        border-color: #0f172a;
      }
      .msg.assistant {
        margin-right: auto;
      }
      .msg.system {
        margin: 0 auto 10px;
        background: #ecfeff;
        border-color: #bae6fd;
        color: #0c4a6e;
      }
      .chat-foot {
        border-top: 1px solid var(--line);
        padding: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 170px 140px;
        gap: 8px;
        margin-bottom: 8px;
      }
      .row-repo {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 8px;
      }
      textarea, input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }
      textarea { min-height: 84px; resize: vertical; }
      button {
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
      }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      @media (max-width: 780px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="chat-shell">
        <header class="chat-head">
          <div class="chat-title" id="chat-title">Live Agent Chat (OpenAI + AgentShield)</div>
          <div class="meta">Session: <code id="session-label">demo-live</code></div>
        </header>
        <main class="chat-body" id="chat-body">
          <div class="msg system">
            This is a real chat-driven agent loop. Ask naturally. AgentShield gates tool actions in the floating panel.
          </div>
        </main>
        <footer class="chat-foot">
          <div class="row">
            <textarea id="prompt-input" placeholder="Describe your problem naturally. Example: Update utils/db.py to add retry logic and explain risks."></textarea>
            <input id="model-input" value="gpt-4o-mini" />
            <input id="provider-input" value="openai" />
          </div>
          <div class="row-repo">
            <input id="repo-input" value="." />
          </div>
          <div class="row">
            <input id="session-input" value="demo-live" />
            <button id="send-btn">Send Prompt</button>
          </div>
        </footer>
      </section>
    </div>

    <script>
      window.AgentShieldConfig = { apiBaseUrl: "http://127.0.0.1:8000", sessionId: "demo-live" };
    </script>
    <script src="/static/agentshield-overlay.js"></script>
    <script>
      const chatBody = document.getElementById("chat-body");
      const chatTitle = document.getElementById("chat-title");
      const promptInput = document.getElementById("prompt-input");
      const modelInput = document.getElementById("model-input");
      const providerInput = document.getElementById("provider-input");
      const repoInput = document.getElementById("repo-input");
      const sessionInput = document.getElementById("session-input");
      const sessionLabel = document.getElementById("session-label");
      const sendBtn = document.getElementById("send-btn");

      function addMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      function syncHeader() {
        const provider = providerInput.value.trim().toLowerCase() === "openai" ? "OpenAI" : "Gemini";
        chatTitle.textContent = `Live Agent Chat (${provider} + AgentShield)`;
      }

      async function runChat() {
        const prompt = promptInput.value.trim();
        const model = modelInput.value.trim() || "gemini-2.5-flash";
        const provider = providerInput.value.trim().toLowerCase() === "openai" ? "openai" : "gemini";
        const sessionId = sessionInput.value.trim() || "demo-live";
        const repoPath = repoInput.value.trim() || ".";
        syncHeader();
        if (!prompt) return;

        window.AgentShieldConfig.sessionId = sessionId;
        sessionLabel.textContent = sessionId;
        addMessage("user", prompt);
        addMessage("system", "Agent is running. Open AgentShield panel to watch live assessments.");
        promptInput.value = "";
        sendBtn.disabled = true;

        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/chat/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt,
              provider,
              model,
              session_id: sessionId,
              max_steps: 8,
              repo_path: repoPath,
            }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || `API ${response.status}`);
          }
          addMessage("assistant", payload.final_text || "(No response)");
        } catch (err) {
          addMessage("system", `Run failed: ${String(err.message || err)}`);
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener("click", runChat);
      providerInput.addEventListener("input", syncHeader);
      promptInput.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") runChat();
      });
      syncHeader();
    </script>
  </body>
</html>
